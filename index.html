<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Meu Tratamento ❤️</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="app">


<header>

<img 
src="fotoprincipal.jpeg"
class="foto-casal"
>


<h1>💊 Meu Tratamento</h1>

<p>Seu cuidado diário meu bem! ❤️</p>


</header>





<button 
class="btn-add"
onclick="abrirFormulario()">

➕ Adicionar remédio

</button>





<section 
class="form"
id="formulario">



<input 
id="nome"
placeholder="Nome do remédio">



<input 
id="dias"
type="number"
placeholder="Dias de tratamento">



<input 
id="horarios"
placeholder="Horários (08:00,20:00)">



<button id="adicionar">

Criar tratamento

</button>



</section>





<div id="lista"></div>



</div>





<script src="app.js"></script>


<!-- 🎵 ÁUDIO -->
<audio id="musicaFundo" loop>
  <source src="Elvis_Presly_-_I_Can_t_Help_Falling_In_Love_With_You_(mp3.pm).mp3" type="audio/mpeg">
</audio>

<button id="btnMusica" class="btn-musica">
🎵 Música
</button>

</body>

</html>
